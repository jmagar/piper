paths:
  /api/mcp/logs:
    get:
      summary: Get MCP logs
      description: Retrieves MCP server logs based on filters
      operationId: getMcpLogs
      tags:
        - MCP
      parameters:
        - name: level
          in: query
          description: Filter logs by level
          required: false
          schema:
            type: string
            enum: [debug, info, error]
        - name: server
          in: query
          description: Filter logs by server name
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of logs to return
          required: false
          schema:
            type: integer
            default: 100
        - name: skip
          in: query
          description: Number of logs to skip (pagination)
          required: false
          schema:
            type: integer
            default: 0
        - name: since
          in: query
          description: Get logs since this timestamp (ISO format)
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: MCP logs retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      $ref: '#/components/schemas/LogEntry'
                  total:
                    type: integer
                    description: Total number of logs matching the filter
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '../main.yaml#/components/responses/ApiError'

  /api/mcp/logs/stream:
    get:
      summary: Stream MCP logs
      description: Establishes a WebSocket connection to stream logs in real-time
      operationId: streamMcpLogs
      tags:
        - MCP
      responses:
        '200':
          description: WebSocket connection established
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [connected]
                  message:
                    type: string
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '../main.yaml#/components/responses/ApiError'

  /api/mcp/config/schema:
    get:
      summary: Get MCP config schema
      description: Retrieves the schema definition for MCP configuration
      operationId: getMcpConfigSchema
      tags:
        - MCP
      responses:
        '200':
          description: MCP config schema retrieved successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '../main.yaml#/components/responses/ApiError'

  /tools/list:
    get:
      summary: List available tools
      description: Returns a list of available tools exposed by this MCP server
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  tools:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          description: The name of the tool
                        description:
                          type: string
                          description: Description of what the tool does
                        parameters:
                          type: object
                          description: Parameters the tool accepts
                        return_type:
                          type: string
                          description: The type of value returned by the tool

components:
  schemas:
    LogEntry:
      type: object
      required:
        - timestamp
        - namespace
        - level
        - message
      properties:
        timestamp:
          type: string
          format: date-time
          description: ISO timestamp when the log was created
        namespace:
          type: string
          description: Debug namespace of the log
        level:
          type: string
          enum: [info, error, debug]
          description: Log level
        message:
          type: string
          description: Log message content
        server:
          type: string
          description: Source of the log (Backend, Frontend, etc.) 