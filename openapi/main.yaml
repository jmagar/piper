openapi: 3.0.0
info:
  title: Pooper API
  version: 1.0.0
  description: |
    API for the Pooper chat application.
    Provides endpoints for chat, MCP, tools, analytics, realtime, config, prompt, and preview services.

servers:
  - url: http://localhost:4100
    description: Local development server

tags:
  - name: Health
    description: Health check endpoints
  - name: Chat
    description: Chat related endpoints
  - name: Config
    description: Configuration endpoints
  - name: MCP
    description: Model Context Protocol endpoints
  - name: Tools
    description: Tool management endpoints
  - name: Analytics
    description: Analytics and metrics endpoints
  - name: Realtime
    description: Realtime communication endpoints
  - name: Prompt
    description: Prompt enhancement and management endpoints
  - name: Preview
    description: Link and content preview endpoints

components:
  responses:
    ApiError:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

  schemas:
    ApiError:
      type: object
      required:
        - message
      properties:
        message:
          type: string
        code:
          type: string
        details:
          type: object
          additionalProperties: true

    ChatMessage:
      $ref: './schemas/langchain.yaml#/components/schemas/ChatMessage'

    ChatMessageType:
      $ref: './schemas/langchain.yaml#/components/schemas/ChatMessageType'

    ChatMessageMetadata:
      $ref: './schemas/langchain.yaml#/components/schemas/ChatMessageMetadata'

    LangChainOptions:
      $ref: './schemas/langchain.yaml#/components/schemas/LangChainOptions'

    Conversation:
      type: object
      required:
        - id
        - title
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true

    StarredMessage:
      type: object
      required:
        - id
        - messageId
        - userId
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        messageId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        note:
          type: string
        createdAt:
          type: string
          format: date-time

    MessageReaction:
      type: object
      required:
        - id
        - messageId
        - userId
        - emoji
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        messageId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        emoji:
          type: string
        createdAt:
          type: string
          format: date-time

    UserStats:
      type: object
      required:
        - userId
        - messageCount
        - conversationCount
      properties:
        userId:
          type: string
          format: uuid
        messageCount:
          type: integer
        conversationCount:
          type: integer
        lastActive:
          type: string
          format: date-time

    ConversationStats:
      type: object
      required:
        - conversationId
        - messageCount
        - participantCount
      properties:
        conversationId:
          type: string
          format: uuid
        messageCount:
          type: integer
        participantCount:
          type: integer
        lastMessage:
          type: string
          format: date-time

    Tool:
      type: object
      required:
        - id
        - name
        - serverId
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        serverId:
          type: string
          format: uuid
        type:
          type: string
          enum: [system, plugin, custom]
          default: custom
        parameters:
          type: array
          items:
            type: object
            required:
              - name
              - type
            properties:
              name:
                type: string
              type:
                type: string
              description:
                type: string
              required:
                type: boolean
                default: false
              schema:
                type: object
                additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

paths:
  /api/chat:
    $ref: './schemas/chat.yaml#/paths/~1api~1chat'
  /api/chat/conversations/{userId}:
    $ref: './schemas/chat.yaml#/paths/~1api~1chat~1conversations~1{userId}'
  /api/chat/messages/star:
    $ref: './schemas/chat.yaml#/paths/~1api~1chat~1messages~1star'
  /api/chat/messages/unstar:
    $ref: './schemas/chat.yaml#/paths/~1api~1chat~1messages~1unstar'
  /api/chat/stats:
    $ref: './schemas/chat.yaml#/paths/~1api~1chat~1stats'
  /api/chat/messages/{messageId}/reactions:
    $ref: './schemas/chat.yaml#/paths/~1api~1chat~1messages~1{messageId}~1reactions'
  /api/chat/messages/{messageId}/thread:
    $ref: './schemas/chat.yaml#/paths/~1api~1chat~1messages~1{messageId}~1thread'
  /api/chat/messages/{messageId}:
    $ref: './schemas/chat.yaml#/paths/~1api~1chat~1messages~1{messageId}'
  /api/mcp/tools:
    $ref: './schemas/mcp.yaml#/paths/~1api~1mcp~1tools'
  /api/mcp/tools/{toolId}:
    $ref: './schemas/mcp.yaml#/paths/~1api~1mcp~1tools~1{toolId}'
  /api/tools:
    $ref: './schemas/tools.yaml#/paths/~1api~1tools'
  /api/tools/{toolId}/invoke:
    $ref: './schemas/tools.yaml#/paths/~1api~1tools~1{toolId}~1invoke'
  /api/analytics/metrics:
    $ref: './schemas/analytics.yaml#/paths/~1api~1analytics~1metrics'
  /api/realtime/status:
    $ref: './schemas/realtime.yaml#/paths/~1api~1realtime~1status'
  /api/realtime/events:
    $ref: './schemas/realtime.yaml#/paths/~1api~1realtime~1events'
  /api/config:
    $ref: './schemas/config.yaml#/paths/~1api~1config'
  /api/prompt/enhance:
    $ref: './schemas/prompt.yaml#/paths/~1api~1prompt~1enhance'
  /api/preview/link:
    $ref: './schemas/preview.yaml#/paths/~1api~1preview~1link'